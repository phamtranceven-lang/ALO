<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ALO</title>

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: Arial;
}

.sidebar {
    width: 260px;
    background: #d9534f;
    color: #fff;
}

.menu-item {
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.menu-parent {
    padding: 16px;
    cursor: pointer;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
}

.menu-parent:hover {
    background: #cf4b47;
}

.submenu {
    display: none;
    background: #c74743;
}

.menu-item.active .submenu {
    display: block;
}

.submenu a {
    display: block;
    padding: 12px 20px;
    color: #fff;
    text-decoration: none;
}

.submenu a:hover {
    background: #b93f3b;
}

/* CONTENT */
.content {
    flex: 1;
    height: 100vh;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: #111;
}
</style>
</head>

<body>

<div class="sidebar">

    <div class="menu-item">
        <div class="menu-parent">Thông Tin ▼</div>
        <div class="submenu">
            <a href="https://phamtranceven-lang.github.io/ALO/giaodien.html" target="frame">Trang chính</a>
            <a href="https://phamtranceven-lang.github.io/ALO/anhsinhvien.html" target="frame">Ảnh sinh viên</a>
        </div>
    </div>

    <div class="menu-item">
        <div class="menu-parent">Tính Điểm ▼</div>
        <div class="submenu">
            <a href="https://phamtranceven-lang.github.io/ALO/tinhdiemhocphan.html" target="frame">Học phần</a>
            <a href="https://phamtranceven-lang.github.io/ALO/tinhdiemtichluy.html" target="frame">Tích lũy</a>
            <a href="https://phamtranceven-lang.github.io/ALO/dudoangpa.html" target="frame">GPA</a>
            <a href="https://phamtranceven-lang.github.io/ALO/tinhdiemgpadukien.html" target="frame">GPA dự kiến</a>
            <a href="https://phamtranceven-lang.github.io/ALO/tinhdiemGDTC.html" target="frame">GDTC</a>
        </div>
    </div>

    <div class="menu-item">
        <div class="menu-parent">Thi KTHP ▼</div>
        <div class="submenu">
            <a href="https://phamtranceven-lang.github.io/ALO/danhsachthi.html" target="frame">Danh sách thi</a>
            <a href="https://phamtranceven-lang.github.io/ALO/phongthi.html" target="frame">Phòng thi</a>
        </div>
    </div>

    <div class="menu-item">
        <div class="menu-parent">Tiện ích ▼</div>
        <div class="submenu">
            <a href="https://phamtranceven-lang.github.io/ALO/danhsachmonhoc.html" target="frame">Môn học</a>
            <a href="https://phamtranceven-lang.github.io/ALO/doitenfilenhanh.html" target="frame">Đổi tên file</a>
            <a href="https://phamtranceven-lang.github.io/ALO/hocphi4nam.html" target="frame">Học phí</a>
        </div>
    </div>

</div>

<div class="content">
    <!-- QUAN TRỌNG: load giaodien -->
    <iframe name="frame" src="https://phamtranceven-lang.github.io/ALO/giaodien.html"></iframe>
</div>

<script>
document.querySelectorAll(".menu-parent").forEach(item => {
    item.addEventListener("click", () => {
        const parent = item.parentElement;

        document.querySelectorAll(".menu-item").forEach(el => {
            if (el !== parent) el.classList.remove("active");
        });

        parent.classList.toggle("active");
    });
});
</script>

</body>
</html>
