000px;cursor:pointer}.flash-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s}.flashcard.flipped .flash-inner{transform:rotateY(180deg)}.front,.back{position:absolute;inset:0;border-radius:26px;background:#1f2937;border:2px solid #1f2937;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;backface-visibility:hidden;padding:28px}.front strong,.back strong{font-size:clamp(34px,6vw,58px);font-weight:950}.pron{margin-top:12px;color:#9ca3af;font-size:20px;font-weight:800}.cat{margin-top:14px;background:#eef2ff;color:#00e5ff;border-radius:999px;padding:7px 12px;font-weight:900}.back{transform:rotateY(180deg);color:#00e5ff}.controls{display:flex;flex-wrap:wrap;justify-content:center;gap:12px}.btn{border:none;border-radius:14px;padding:13px 18px;background:#eef2ff;color:#2636b8;font-weight:950;cursor:pointer}.btn.primary{background:#00e5ff;color:white}.btn.danger{background:#fee2e2;color:#b91c1c}.progress,.score{text-align:center;color:#374151;font-weight:950}.quiz-box,.test-area{max-width:760px;margin:auto}.question{font-size:36px;font-weight:950;text-align:center;margin-bottom:26px}.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.choice{border:2px solid #1f2937;background:#1f2937;border-radius:18px;padding:22px;text-align:left;font-size:18px;font-weight:900;cursor:pointer}.choice.correct{border-color:#22c55e;background:#dcfce7}.choice.wrong{border-color:#ef4444;background:#fee2e2}.test-area{display:flex;flex-direction:column;gap:18px}.result{font-size:20px;font-weight:950;text-align:center;min-height:28px}#list h2{color:#fff;margin-bottom:16px;font-size:26px;font-weight:950}.word-list{margin-top:18px;display:flex;flex-direction:column;gap:12px;width:100%}.word-row{width:100%;background:#0f172a;border-radius:16px;padding:16px 18px;border:1px solid rgba(96,165,250,.65);display:grid;grid-template-columns:minmax(180px,.9fr) minmax(260px,1.6fr) auto;align-items:center;gap:18px;font-weight:850;color:#fff}.word-main{min-width:0;display:flex;flex-direction:column;gap:5px}.word-meaning{min-width:0;color:#dbeafe;font-weight:800;line-height:1.5;padding-left:18px;border-left:1px solid rgba(96,165,250,.28)}.word-actions{display:flex;justify-content:flex-end;align-items:center}.word-row b{font-size:20px}.word-row small{display:block;color:#9ca3af}.word-row .speaker-btn{margin-left:0;min-width:46px;height:46px;font-size:20px;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 18px rgba(0,229,255,.18)}.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.match-col{display:flex;flex-direction:column;gap:12px}.match-item{background:#0f172a;border:2px solid #1f2937;padding:18px;border-radius:16px;font-size:18px;font-weight:950;cursor:pointer;min-height:62px}.match-item.selected{border-color:#00e5ff;background:#eef2ff}.match-item.done{opacity:.28;pointer-events:none;text-decoration:line-through}.blast-game{position:relative;height:360px;overflow:hidden;background:linear-gradient(#eef2ff,#fff);border-radius:22px;border:2px solid #1f2937;margin-bottom:16px}.falling-word{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:#00e5ff;color:white;padding:14px 22px;border-radius:999px;font-size:26px;font-weight:950}.falling-word.animate{animation:fall 8s linear forwards}@keyframes fall{from{top:16px}to{top:310px}}@media(max-width:820px){.toolbar,.modes,.choices,.match-grid,.stats{grid-template-columns:1fr}.mode-btn{justify-content:flex-start}.panel{padding:20px}}

.topic-header{
  position:relative;
  overflow:hidden;
  isolation:isolate;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  min-height:62px;
  padding:16px 18px;
  border-radius:20px;
  margin:26px 0 8px;
  border:1px solid rgba(255,255,255,.18);
  background:
    radial-gradient(circle at 12% 15%,rgba(255,255,255,.34),transparent 30%),
    linear-gradient(135deg,var(--topic-a,#06b6d4),var(--topic-b,#7c3aed) 58%,var(--topic-c,#ec4899));
  color:#fff;
  font-weight:950;
  letter-spacing:.55px;
  box-shadow:0 18px 40px rgba(0,0,0,.32),0 0 30px var(--topic-glow,rgba(34,211,238,.24));
  transform:translateZ(0);
  transition:transform .22s ease,filter .22s ease,box-shadow .22s ease;
}
.topic-header::before{
  content:"";
  position:absolute;
  inset:-50%;
  background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.38) 50%,transparent 65%);
  transform:translateX(-78%) rotate(8deg);
  animation:topicShine 5.6s ease-in-out infinite;
  z-index:-1;
  pointer-events:none;
}
.topic-header::after{
  content:"";
  position:absolute;
  right:-46px;
  top:-48px;
  width:145px;
  height:145px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  filter:blur(2px);
  z-index:-1;
  pointer-events:none;
}
.topic-header:hover{
  transform:translateY(-2px) scale(1.006);
  filter:saturate(1.14);
  box-shadow:0 22px 48px rgba(0,0,0,.38),0 0 38px var(--topic-glow,rgba(34,211,238,.32));
}
.topic-title{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}
.topic-dot{
  width:12px;
  height:12px;
  border-radius:999px;
  background:#fff;
  box-shadow:0 0 0 6px rgba(255,255,255,.15),0 0 18px rgba(255,255,255,.85);
  flex:0 0 auto;
}
.topic-name{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:18px;
}
.topic-count{
  flex:0 0 auto;
  padding:7px 11px;
  border-radius:999px;
  background:rgba(15,23,42,.30);
  border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.94);
  font-size:13px;
  font-weight:950;
  letter-spacing:.2px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.18);
}
.topic-empty{
  justify-content:center;
  text-align:center;
  background:linear-gradient(135deg,#334155,#0f172a);
  box-shadow:0 14px 30px rgba(0,0,0,.25);
}
@keyframes topicShine{
  0%,42%{transform:translateX(-78%) rotate(8deg);opacity:0}
  55%{opacity:.85}
  72%,100%{transform:translateX(78%) rotate(8deg);opacity:0}
}
@media(prefers-reduced-motion:reduce){
  .topic-header,.topic-header::before{transition:none;animation:none}
}
.word-speak{
  cursor:pointer;
  color:#fff;
}
.word-speak:hover{
  color:#00e5ff;
}
.speaker-btn{
  border:none;
  border-radius:999px;
  padding:6px 9px;
  background:#00e5ff;
  color:#fff;
  font-weight:900;
  cursor:pointer;
  margin-left:8px;
}
@media(max-width:700px){
  .word-row{
    grid-template-columns:1fr auto;
    gap:10px 12px;
  }
  .word-meaning{
    grid-column:1/-1;
    padding-left:0;
    padding-top:10px;
    border-left:none;
    border-top:1px solid rgba(96,165,250,.28);
  }
  .word-actions{
    align-self:start;
  }
  .topic-header{
    align-items:flex-start;
    flex-direction:column;
    gap:9px;
    padding:14px 15px;
  }
  .topic-name{
    white-space:normal;
  }
  .topic-count{
    align-self:flex-start;
  }
}

</style>

<div class="app">

  <section id="learn" class="panel"><div class="quiz-box"><div class="question" id="learnQuestion"></div><div class="choices" id="choices"></div><div class="score" id="learnScore"></div></div></section>
  <section id="test" class="panel"><div class="test-area"><div class="question" id="testQuestion"></div><input class="input" id="testInput" placeholder="Nhập nghĩa tiếng Việt..." onkeydown="if(event.key==='Enter')checkTest()"/><button class="btn primary" onclick="checkTest()">Kiểm tra</button><button class="btn" onclick="newTestQuestion()">Câu khác</button><div class="result" id="testResult"></div></div></section>
  
<section id="list" class="panel">
<h2>Danh sách từ vựng theo chủ đề</h2>

</div>
<script>

function escapeHTML(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function escapeAttr(value){
  return escapeHTML(value).replaceAll('`','&#096;');
}
function speakText(text){
  if(!("speechSynthesis" in window)) return;
  const utterance = new SpeechSynthesisUtterance(String(text || ""));
  utterance.lang = "en-US";
  utterance.rate = 0.9;
  utterance.pitch = 1;
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function saveStatus(){const o={};allVocab.forEach(v=>{if(v.status!=='new')o[v.word]=v.status});localStorage.setItem('vocabStatusByWord',JSON.stringify(o))}
function initCategories(){const s=document.getElementById('categorySelect');s.innerHTML='<option value="all">Tất cả chủ đề</option>'+TOPICS.map(t=>'<option value="'+t.title+'">'+t.title+' ('+t.items.length+')</option>').join('');document.getElementById('statTopics').textContent=TOPICS.length;document.getElementById('totalPill').textContent=allVocab.length+' từ / '+TOPICS.length+' chủ đề'}
function applyFilters(){
  const cat=document.getElementById('categorySelect').value,
        q=normalize(document.getElementById('searchBox').value),
        lim=document.getElementById('limitSelect').value;

  // Bộ từ trung tâm cho toàn bộ app: chọn chủ đề nào thì mọi tính năng đều dùng đúng chủ đề đó.
  vocab=allVocab.filter(v=>(cat==='all'||v.category===cat)&&(!q||normalize(v.word+' '+v.meaning+' '+v.category).includes(q)));
  if(lim!=='all')vocab=vocab.slice(0,+lim);

  current=0;
  updateStats();
  renderFlashcard();
  refreshActiveMode();
}
function refreshActiveMode(){
  if(activeMode==='learn')newLearnQuestion(true);
  if(activeMode==='test')newTestQuestion();
  if(activeMode==='list')renderList();
  if(activeMode==='blast')startBlast();
  if(activeMode==='match')startMatch();
}
function updateStats(){document.getElementById('statWords').textContent=vocab.length;document.getElementById('statKnown').textContent=vocab.filter(v=>v.status==='known').length;document.getElementById('statHard').textContent=vocab.filter(v=>v.status==='hard').length}
function switchMode(id,btn){activeMode=id;document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(id==='learn')newLearnQuestion();if(id==='test')newTestQuestion();if(id==='list')renderList();if(id==='blast')startBlast();if(id==='match')startMatch()}
function safeItem(){if(!vocab.length){return {word:'Không có từ',pron:'',meaning:'Chọn chủ đề khác',category:'Trống'}}return vocab[current%vocab.length]}
function renderFlashcard(){const item=safeItem();document.getElementById('frontText').textContent=item.word;document.getElementById('frontPron').textContent=item.pron||'';document.getElementById('frontCat').textContent=item.category||'';document.getElementById('backText').textContent=item.meaning;document.getElementById('flashProgress').textContent=vocab.length?(current+1)+' / '+vocab.length:'0 / 0';document.getElementById('flashcard').classList.remove('flipped');updateStats()}
function flipCard(){document.getElementById('flashcard').classList.toggle('flipped')}function nextCard(e){e&&e.stopPropagation();if(vocab.length){current=(current+1)%vocab.length;renderFlashcard()}}function prevCard(e){e&&e.stopPropagation();if(vocab.length){current=(current-1+vocab.length)%vocab.length;renderFlashcard()}}function shuffleCards(e){e&&e.stopPropagation();vocab.sort(()=>Math.random()-.5);current=0;renderFlashcard()}function markKnown(e){e&&e.stopPropagation();const it=safeItem();it.status='known';const base=allVocab.find(v=>v.word===it.word);if(base)base.status='known';saveStatus();nextCard(e)}function markHard(e){e&&e.stopPropagation();const it=safeItem();it.status='hard';const base=allVocab.find(v=>v.word===it.word);if(base)base.status='hard';saveStatus();nextCard(e)}function speakWord(e){e&&e.stopPropagation();const u=new SpeechSynthesisUtterance(safeItem().word);u.lang='en-US';speechSynthesis.speak(u)}
function randomItem(){return vocab[Math.floor(Math.random()*vocab.length)]||safeItem()}function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function newLearnQuestion(resetScore=false){
  const c=document.getElementById('choices');
  if(resetScore){learnScore=0;learnTotal=0;}
  if(!vocab.length){
    document.getElementById('learnQuestion').textContent='Không có từ trong chủ đề này';
    c.innerHTML='';
    document.getElementById('learnScore').textContent='Điểm: '+learnScore+'/'+learnTotal;
    return;
  }

  const correct=randomItem();
  // Đáp án nhiễu ưu tiên lấy trong chính chủ đề đang chọn để bài học bám sát chủ đề.
  let wrongPool=shuffle(vocab.filter(v=>v.word!==correct.word && v.meaning!==correct.meaning));
  if(wrongPool.length<3){
    wrongPool=shuffle([...wrongPool,...allVocab.filter(v=>v.word!==correct.word && v.meaning!==correct.meaning && !wrongPool.some(w=>w.word===v.word))]);
  }
  const opts=shuffle([correct,...wrongPool.slice(0,3)]);

  document.getElementById('learnQuestion').textContent=correct.word;
  c.innerHTML='';
  opts.forEach(opt=>{
    const b=document.createElement('button');
    b.className='choice';
    b.textContent=opt.meaning;
    b.onclick=()=>{
      learnTotal++;
      if(opt.meaning===correct.meaning){learnScore++;b.classList.add('correct')}else b.classList.add('wrong');
      document.getElementById('learnScore').textContent='Điểm: '+learnScore+'/'+learnTotal;
      setTimeout(()=>newLearnQuestion(false),900);
    };
    c.appendChild(b);
  });
  document.getElementById('learnScore').textContent='Điểm: '+learnScore+'/'+learnTotal;
}
function newTestQuestion(){
  testCurrent=randomItem();
  document.getElementById('testQuestion').textContent=testCurrent.word;
  document.getElementById('testInput').value='';
  document.getElementById('testResult').textContent=vocab.length?'':'Chọn chủ đề khác để kiểm tra';
}
function checkTest(){
  if(!vocab.length)return;
  const input=normalize(document.getElementById('testInput').value),ans=normalize(testCurrent.meaning),r=document.getElementById('testResult');
  if(input===ans){r.textContent='Đúng rồi ✅';r.style.color='#16a34a';setTimeout(newTestQuestion,900)}else{r.textContent='Sai rồi ❌ Đáp án: '+testCurrent.meaning;r.style.color='#dc2626'}
}
function renderList(){
  const container = document.getElementById('wordList');
  container.className = 'word-list';
  container.innerHTML = '';

  const topicThemes = [
    ['#06b6d4','#2563eb','#7c3aed','rgba(56,189,248,.30)'],
    ['#f97316','#ec4899','#8b5cf6','rgba(236,72,153,.30)'],
    ['#22c55e','#14b8a6','#06b6d4','rgba(45,212,191,.30)'],
    ['#f59e0b','#ef4444','#ec4899','rgba(248,113,113,.30)'],
    ['#8b5cf6','#6366f1','#0ea5e9','rgba(129,140,248,.32)'],
    ['#10b981','#84cc16','#eab308','rgba(132,204,22,.26)'],
    ['#ec4899','#d946ef','#6366f1','rgba(217,70,239,.30)'],
    ['#38bdf8','#0ea5e9','#1d4ed8','rgba(14,165,233,.30)']
  ];

  if(!vocab.length){
    const empty = document.createElement('div');
    empty.className = 'topic-header topic-empty';
    empty.textContent = 'KHÔNG CÓ TỪ PHÙ HỢP';
    container.appendChild(empty);
    return;
  }

  const countByCategory = vocab.reduce((acc,item)=>{
    const category = item.category || 'Chủ đề';
    acc[category] = (acc[category] || 0) + 1;
    return acc;
  },{});

  let currentCategory = '';
  let topicIndex = 0;
  vocab.forEach(item=>{
    const category = item.category || 'Chủ đề';
    if(category !== currentCategory){
      currentCategory = category;
      const theme = topicThemes[topicIndex % topicThemes.length];
      topicIndex += 1;

      const header = document.createElement('div');
      header.className = 'topic-header';
      header.style.setProperty('--topic-a', theme[0]);
      header.style.setProperty('--topic-b', theme[1]);
      header.style.setProperty('--topic-c', theme[2]);
      header.style.setProperty('--topic-glow', theme[3]);

      const title = document.createElement('div');
      title.className = 'topic-title';

      const dot = document.createElement('span');
      dot.className = 'topic-dot';

      const name = document.createElement('span');
      name.className = 'topic-name';
      name.textContent = category.toUpperCase();

      const count = document.createElement('span');
      count.className = 'topic-count';
      count.textContent = (countByCategory[category] || 0) + ' từ';

      title.appendChild(dot);
      title.appendChild(name);
      header.appendChild(title);
      header.appendChild(count);
      container.appendChild(header);
    }

    const row = document.createElement('div');
    row.className = 'word-row';

    const left = document.createElement('div');
    left.className = 'word-main';

    const word = document.createElement('b');
    word.className = 'word-speak';
    word.textContent = item.word || '';
    word.onclick = ()=>speakText(item.word || '');

    const small = document.createElement('small');
    small.textContent = item.pron || '';

    const right = document.createElement('div');
    right.className = 'word-meaning';
    right.textContent = item.meaning || '';

    const actions = document.createElement('div');
    actions.className = 'word-actions';

    const speak = document.createElement('button');
    speak.className = 'speaker-btn';
    speak.type = 'button';
    speak.title = 'Nghe phát âm';
    speak.setAttribute('aria-label', 'Nghe phát âm ' + (item.word || ''));
    speak.textContent = '🔊';
    speak.onclick = (event)=>{event.stopPropagation();speakText(item.word || '')};

    left.appendChild(word);
    left.appendChild(small);
    actions.appendChild(speak);

    row.appendChild(left);
    row.appendChild(right);
    row.appendChild(actions);
    container.appendChild(row);
  });
}

function startBlast(){
  const w=document.getElementById('fallingWord');
  w.classList.remove('animate');
  void w.offsetWidth;
  if(!vocab.length){
    blastCurrent=null;
    w.textContent='Không có từ';
    document.getElementById('blastInput').value='';
    document.getElementById('blastScore').textContent='Chọn chủ đề khác để chơi Blast';
    return;
  }
  blastCurrent=randomItem();
  w.textContent=blastCurrent.word;
  w.classList.add('animate');
  document.getElementById('blastInput').value='';
  document.getElementById('blastScore').textContent='Điểm Blast: '+blastScore;
}function checkBlast(){if(!blastCurrent)return;const input=normalize(document.getElementById('blastInput').value);if(input===normalize(blastCurrent.meaning)){blastScore++;startBlast()}else document.getElementById('blastScore').textContent='Sai rồi. Nghĩa đúng: '+blastCurrent.meaning}
function startMatch(){
  clearInterval(matchInterval);
  matchSeconds=0;
  selectedWord=null;
  selectedMeaning=null;
  const words=document.getElementById('matchWords'),meanings=document.getElementById('matchMeanings');
  words.innerHTML='';
  meanings.innerHTML='';
  if(!vocab.length){
    document.getElementById('matchTimer').textContent='Không có từ trong chủ đề này';
    return;
  }
  document.getElementById('matchTimer').textContent='Thời gian: 0s';
  matchInterval=setInterval(()=>{matchSeconds++;document.getElementById('matchTimer').textContent='Thời gian: '+matchSeconds+'s'},1000);
  const sample=shuffle(vocab).slice(0,Math.min(6,vocab.length));
  sample.forEach(item=>{const d=document.createElement('div');d.className='match-item';d.textContent=item.word;d.dataset.word=item.word;d.onclick=()=>selectMatch(d,'word');words.appendChild(d)});
  shuffle(sample).forEach(item=>{const d=document.createElement('div');d.className='match-item';d.textContent=item.meaning;d.dataset.word=item.word;d.onclick=()=>selectMatch(d,'meaning');meanings.appendChild(d)});
}
function selectMatch(el,type){if(type==='word'){document.querySelectorAll('#matchWords .match-item').forEach(i=>i.classList.remove('selected'));selectedWord=el}else{document.querySelectorAll('#matchMeanings .match-item').forEach(i=>i.classList.remove('selected'));selectedMeaning=el}el.classList.add('selected');if(selectedWord&&selectedMeaning){if(selectedWord.dataset.word===selectedMeaning.dataset.word){selectedWord.classList.add('done');selectedMeaning.classList.add('done')}selectedWord.classList.remove('selected');selectedMeaning.classList.remove('selected');selectedWord=null;selectedMeaning=null;if(document.querySelectorAll('.match-item:not(.done)').length===0){clearInterval(matchInterval);document.getElementById('matchTimer').textContent='Hoàn thành trong '+matchSeconds+'s 🎉'}}}
initCategories();applyFilters();renderFlashcard();

</script>
</body></html>
