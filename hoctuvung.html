*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif}body{min-height:100vh;background:#0b0f19;color:#1f2937}.app{width:min(1180px,94%);margin:auto;padding:16px 0 50px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:14px}.logo{font-size:28px;font-weight:950;color:#00e5ff}.pill{background:#e8ebff;color:#2f3ecc;padding:10px 14px;border-radius:999px;font-weight:900}.hero h1{font-size:clamp(32px,5vw,54px);line-height:1.05;margin-bottom:10px}.sub{color:#9ca3af;font-weight:800}.rating{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:20px;font-weight:900}.star{color:#f2b600;font-size:30px}.toolbar{display:grid;grid-template-columns:1.3fr .9fr .7fr;gap:12px;margin:14px 0}.input,.select{width:100%;padding:15px 16px;border:2px solid #1f2937;border-radius:16px;background:#1f2937;font-size:16px;font-weight:800;outline:none}.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:16px 0 22px}.mode-btn{background:#1f2937;border:2px solid transparent;border-radius:18px;padding:22px;display:flex;justify-content:center;align-items:center;gap:14px;font-size:21px;font-weight:950;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,.08);transition:.18s}.mode-btn:hover,.mode-btn.active{border-color:#00e5ff;transform:translateY(-2px)}.icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#00e5ff,#38bdf8);display:inline-block}.panel{display:none;background:#1f2937;border-radius:26px;padding:30px;box-shadow:0 16px 35px rgba(0,0,0,.08);min-height:430px}.panel.active{display:block}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}.stat{background:#0f172a;border:1px solid #1f2937;border-radius:18px;padding:16px}.stat b{font-size:24px}.stat span{display:block;color:#9ca3af;font-weight:800;margin-top:4px}.flashcard-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}.flashcard{width:min(760px,100%);height:320px;perspective:1000px;cursor:pointer}.flash-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s}.flashcard.flipped .flash-inner{transform:rotateY(180deg)}.front,.back{position:absolute;inset:0;border-radius:26px;background:#1f2937;border:2px solid #1f2937;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;backface-visibility:hidden;padding:28px}.front strong,.back strong{font-size:clamp(34px,6vw,58px);font-weight:950}.pron{margin-top:12px;color:#9ca3af;font-size:20px;font-weight:800}.cat{margin-top:14px;background:#eef2ff;color:#00e5ff;border-radius:999px;padding:7px 12px;font-weight:900}.back{transform:rotateY(180deg);color:#00e5ff}.controls{display:flex;flex-wrap:wrap;justify-content:center;gap:12px}.btn{border:none;border-radius:14px;padding:13px 18px;background:#eef2ff;color:#2636b8;font-weight:950;cursor:pointer}.btn.primary{background:#00e5ff;color:white}.btn.danger{background:#fee2e2;color:#b91c1c}.progress,.score{text-align:center;color:#374151;font-weight:950}.quiz-box,.test-area{max-width:760px;margin:auto}.question{font-size:36px;font-weight:950;text-align:center;margin-bottom:26px}.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.choice{border:2px solid #1f2937;background:#1f2937;border-radius:18px;padding:22px;text-align:left;font-size:18px;font-weight:900;cursor:pointer}.choice.correct{border-color:#22c55e;background:#dcfce7}.choice.wrong{border-color:#ef4444;background:#fee2e2}.test-area{display:flex;flex-direction:column;gap:18px}.result{font-size:20px;font-weight:950;text-align:center;min-height:28px}#list h2{color:#fff;margin-bottom:16px;font-size:26px;font-weight:950}.word-list{margin-top:18px;display:flex;flex-direction:column;gap:12px;width:100%}.word-row{width:100%;background:#0f172a;border-radius:16px;padding:16px 18px;border:1px solid rgba(96,165,250,.65);display:grid;grid-template-columns:minmax(180px,.9fr) minmax(260px,1.6fr) auto;align-items:center;gap:18px;font-weight:850;color:#fff}.word-main{min-width:0;display:flex;flex-direction:column;gap:5px}.word-meaning{min-width:0;color:#dbeafe;font-weight:800;line-height:1.5;padding-left:18px;border-left:1px solid rgba(96,165,250,.28)}.word-actions{display:flex;justify-content:flex-end;align-items:center}.word-row b{font-size:20px}.word-row small{display:block;color:#9ca3af}.word-row .speaker-btn{margin-left:0;min-width:46px;height:46px;font-size:20px;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 18px rgba(0,229,255,.18)}.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.match-col{display:flex;flex-direction:column;gap:12px}.match-item{background:#0f172a;border:2px solid #1f2937;padding:18px;border-radius:16px;font-size:18px;font-weight:950;cursor:pointer;min-height:62px}.match-item.selected{border-color:#00e5ff;background:#eef2ff}.match-item.done{opacity:.28;pointer-events:none;text-decoration:line-through}.blast-game{position:relative;height:360px;overflow:hidden;background:linear-gradient(#eef2ff,#fff);border-radius:22px;border:2px solid #1f2937;margin-bottom:16px}.falling-word{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:#00e5ff;color:white;padding:14px 22px;border-radius:999px;font-size:26px;font-weight:950}.falling-word.animate{animation:fall 8s linear forwards}@keyframes fall{from{top:16px}to{top:310px}}@media(max-width:820px){.toolbar,.modes,.choices,.match-grid,.stats{grid-template-columns:1fr}.mode-btn{justify-content:flex-start}.panel{padding:20px}}

.topic-header{
  position:relative;
  overflow:hidden;
  isolation:isolate;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  min-height:62px;
  padding:16px 18px;
  border-radius:20px;
  margin:26px 0 8px;
  border:1px solid rgba(255,255,255,.18);
  background:
    radial-gradient(circle at 12% 15%,rgba(255,255,255,.34),transparent 30%),
    linear-gradient(135deg,var(--topic-a,#06b6d4),var(--topic-b,#7c3aed) 58%,var(--topic-c,#ec4899));
  color:#fff;
  font-weight:950;
  letter-spacing:.55px;
  box-shadow:0 18px 40px rgba(0,0,0,.32),0 0 30px var(--topic-glow,rgba(34,211,238,.24));
  transform:translateZ(0);
  transition:transform .22s ease,filter .22s ease,box-shadow .22s ease;
}
.topic-header::before{
  content:"";
  position:absolute;
  inset:-50%;
  background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.38) 50%,transparent 65%);
  transform:translateX(-78%) rotate(8deg);
  animation:topicShine 5.6s ease-in-out infinite;
  z-index:-1;
  pointer-events:none;
}
.topic-header::after{
  content:"";
  position:absolute;
  right:-46px;
  top:-48px;
  width:145px;
  height:145px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  filter:blur(2px);
  z-index:-1;
  pointer-events:none;
}
.topic-header:hover{
  transform:translateY(-2px) scale(1.006);
  filter:saturate(1.14);
  box-shadow:0 22px 48px rgba(0,0,0,.38),0 0 38px var(--topic-glow,rgba(34,211,238,.32));
}
.topic-title{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}
.topic-dot{
  width:12px;
  height:12px;
  border-radius:999px;
  background:#fff;
  box-shadow:0 0 0 6px rgba(255,255,255,.15),0 0 18px rgba(255,255,255,.85);
  flex:0 0 auto;
}
.topic-name{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:18px;
}
.topic-count{
  flex:0 0 auto;
  padding:7px 11px;
  border-radius:999px;
  background:rgba(15,23,42,.30);
  border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.94);
  font-size:13px;
  font-weight:950;
  letter-spacing:.2px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.18);
}
.topic-empty{
  justify-content:center;
  text-align:center;
  background:linear-gradient(135deg,#334155,#0f172a);
  box-shadow:0 14px 30px rgba(0,0,0,.25);
}
@keyframes topicShine{
  0%,42%{transform:translateX(-78%) rotate(8deg);opacity:0}
  55%{opacity:.85}
  72%,100%{transform:translateX(78%) rotate(8deg);opacity:0}
}
@media(prefers-reduced-motion:reduce){
  .topic-header,.topic-header::before{transition:none;animation:none}
}
.word-speak{
  cursor:pointer;
  color:#fff;
}
.word-speak:hover{
  color:#00e5ff;
}
.speaker-btn{
  border:none;
  border-radius:999px;
  padding:6px 9px;
  background:#00e5ff;
  color:#fff;
  font-weight:900;
  cursor:pointer;
  margin-left:8px;
}
@media(max-width:700px){
  .word-row{
    grid-template-columns:1fr auto;
    gap:10px 12px;
  }
  .word-meaning{
    grid-column:1/-1;
    padding-left:0;
    padding-top:10px;
    border-left:none;
    border-top:1px solid rgba(96,165,250,.28);
  }
  .word-actions{
    align-self:start;
  }
  .topic-header{
    align-items:flex-start;
    flex-direction:column;
    gap:9px;
    padding:14px 15px;
  }
  .topic-name{
    white-space:normal;
  }
  .topic-count{
    align-self:flex-start;
  }
}


.online-lookup-card{
  margin:14px 0 20px;
  padding:18px;
  border-radius:20px;
  background:linear-gradient(135deg,rgba(0,229,255,.12),rgba(56,189,248,.06));
  border:1px solid rgba(0,229,255,.38);
  color:#fff;
  box-shadow:0 12px 28px rgba(0,0,0,.24);
}
.online-lookup-card h3{
  margin:0 0 10px;
  font-size:22px;
  color:#00e5ff;
}
.online-lookup-card p{
  margin:7px 0;
  line-height:1.55;
  color:#dbeafe;
  font-weight:800;
}
.online-lookup-card .mini{
  color:#9ca3af;
  font-size:13px;
  font-weight:800;
}
.online-lookup-actions{
  margin-top:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.online-lookup-actions button{
  border:none;
  border-radius:999px;
  padding:10px 14px;
  background:#00e5ff;
  color:#06111f;
  font-weight:950;
  cursor:pointer;
}
.online-lookup-actions button.secondary{
  background:#1f2937;
  color:#fff;
  border:1px solid rgba(255,255,255,.12);
}

</style>

<body>
<div class="app">
  <div class="topbar"><div class="logo">VocabPlus</div><div class="pill" id="totalPill"></div></div>
  <div class="toolbar"><input id="searchBox" class="input" placeholder="Tìm từ hoặc nghĩa..." oninput="applyFilters()"/><select id="categorySelect" class="select" onchange="applyFilters()"></select><select id="limitSelect" class="select" onchange="applyFilters()"><option value="all">Tất cả từ</option><option value="20">20 từ</option><option value="50">50 từ</option><option value="100">100 từ</option></select></div>
  <div id="onlineLookupResult"></div>
  <div class="stats"><div class="stat"><b id="statTopics">0</b><span>Chủ đề</span></div><div class="stat"><b id="statWords">0</b><span>Từ đang học</span></div><div class="stat"><b id="statKnown">0</b><span>Đã nhớ</span></div><div class="stat"><b id="statHard">0</b><span>Chưa nhớ</span></div></div>
  <section class="modes"><button class="mode-btn active" onclick="switchMode('flashcards',this)"><span class="icon"></span>Thẻ ghi nhớ</button><button class="mode-btn" onclick="switchMode('learn',this)"><span class="icon"></span>Học</button><button class="mode-btn" onclick="switchMode('test',this)"><span class="icon"></span>Kiểm tra</button><button class="mode-btn" onclick="switchMode('list',this)"><span class="icon"></span>Khối hộp</button><button class="mode-btn" onclick="switchMode('blast',this)"><span class="icon"></span>Blast</button><button class="mode-btn" onclick="switchMode('match',this)"><span class="icon"></span>Ghép thẻ</button></section>
  <section id="flashcards" class="panel active"><div class="flashcard-wrap"><div class="progress" id="flashProgress"></div><div class="flashcard" id="flashcard" onclick="flipCard()"><div class="flash-inner"><div class="front"><strong id="frontText"></strong><div class="pron" id="frontPron"></div><div class="cat" id="frontCat"></div></div><div class="back"><strong id="backText"></strong><div class="pron">Click để lật lại</div></div></div></div><div class="controls"><button class="btn" onclick="prevCard(event)">← Trước</button><button class="btn primary" onclick="nextCard(event)">Tiếp →</button><button class="btn" onclick="speakWord(event)">🔊 Đọc</button><button class="btn" onclick="shuffleCards(event)">Xáo trộn</button><button class="btn danger" onclick="markHard(event)">Chưa nhớ</button><button class="btn" onclick="markKnown(event)">Đã nhớ</button></div></div></section>
  <section id="learn" class="panel"><div class="quiz-box"><div class="question" id="learnQuestion"></div><div class="choices" id="choices"></div><div class="score" id="learnScore"></div></div></section>
  <section id="test" class="panel"><div class="test-area"><div class="question" id="testQuestion"></div><input class="input" id="testInput" placeholder="Nhập nghĩa tiếng Việt..." onkeydown="if(event.key==='Enter')checkTest()"/><button class="btn primary" onclick="checkTest()">Kiểm tra</button><button class="btn" onclick="newTestQuestion()">Câu khác</button><div class="result" id="testResult"></div></div></section>
  
<section id="list" class="panel">
<h2>Danh sách từ vựng theo chủ đề</h2>
<div id="wordList"></div>
</section>

  <section id="blast" class="panel"><div class="blast-game"><div class="falling-word" id="fallingWord"></div></div><input class="input" id="blastInput" placeholder="Gõ nghĩa rồi Enter để bắn..." onkeydown="if(event.key==='Enter')checkBlast()"/><div class="score" id="blastScore"></div></section>
  <section id="match" class="panel"><div class="score" id="matchTimer">Thời gian: 0s</div><div class="match-grid"><div class="match-col" id="matchWords"></div><div class="match-col" id="matchMeanings"></div></div><div class="controls" style="margin-top:18px"><button class="btn primary" onclick="startMatch()">Chơi lại</button></div></section>
</div>
<script>

function escapeHTML(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function escapeAttr(value){
  return escapeHTML(value).replaceAll('`','&#096;');
}
function speakText(text){
  if(!("speechSynthesis" in window)) return;
  const utterance = new SpeechSynthesisUtterance(String(text || ""));
  utterance.lang = "en-US";
  utterance.rate = 0.9;
  utterance.pitch = 1;
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function newLearnQuestion(resetScore=false){
  const c=document.getElementById('choices');
  if(resetScore){learnScore=0;learnTotal=0;}
  if(!vocab.length){
    document.getElementById('learnQuestion').textContent='Không có từ trong chủ đề này';
    c.innerHTML='';
    document.getElementById('learnScore').textContent='Điểm: '+learnScore+'/'+learnTotal;
    return;
  }

  const correct=randomItem();
  // Đáp án nhiễu ưu tiên lấy trong chính chủ đề đang chọn để bài học bám sát chủ đề.
  let wrongPool=shuffle(vocab.filter(v=>v.word!==correct.word && v.meaning!==correct.meaning));
  if(wrongPool.length<3){
    wrongPool=shuffle([...wrongPool,...allVocab.filter(v=>v.word!==correct.word && v.meaning!==correct.meaning && !wrongPool.some(w=>w.word===v.word))]);
  }
  const opts=shuffle([correct,...wrongPool.slice(0,3)]);

  document.getElementById('learnQuestion').textContent=correct.word;
  c.innerHTML='';
  opts.forEach(opt=>{
    const b=document.createElement('button');
    b.className='choice';
    b.textContent=opt.meaning;
    b.onclick=()=>{
      learnTotal++;
      if(opt.meaning===correct.meaning){learnScore++;b.classList.add('correct')}else b.classList.add('wrong');
      document.getElementById('learnScore').textContent='Điểm: '+learnScore+'/'+learnTotal;
      setTimeout(()=>newLearnQuestion(false),900);
    };
    c.appendChild(b);
  });
  document.getElementById('learnScore').textContent='Điểm: '+learnScore+'/'+learnTotal;
}

    ['#22c55e','#14b8a6','#06b6d4','rgba(45,212,191,.30)'],
    ['#f59e0b','#ef4444','#ec4899','rgba(248,113,113,.30)'],
    ['#8b5cf6','#6366f1','#0ea5e9','rgba(129,140,248,.32)'],
    ['#10b981','#84cc16','#eab308','rgba(132,204,22,.26)'],
    ['#ec4899','#d946ef','#6366f1','rgba(217,70,239,.30)'],
    ['#38bdf8','#0ea5e9','#1d4ed8','rgba(14,165,233,.30)']
  ];

  if(!vocab.length){
    const empty = document.createElement('div');
    empty.className = 'topic-header topic-empty';
    empty.textContent = 'KHÔNG CÓ TỪ PHÙ HỢP';
    container.appendChild(empty);
    return;
  }

  const countByCategory = vocab.reduce((acc,item)=>{
    const category = item.category || 'Chủ đề';
    acc[category] = (acc[category] || 0) + 1;
    return acc;
  },{});

  let currentCategory = '';
  let topicIndex = 0;
  vocab.forEach(item=>{
    const category = item.category || 'Chủ đề';
    if(category !== currentCategory){
      currentCategory = category;
      const theme = topicThemes[topicIndex % topicThemes.length];
      topicIndex += 1;

      const header = document.createElement('div');
      header.className = 'topic-header';
      header.style.setProperty('--topic-a', theme[0]);
      header.style.setProperty('--topic-b', theme[1]);
      header.style.setProperty('--topic-c', theme[2]);
      header.style.setProperty('--topic-glow', theme[3]);

      const title = document.createElement('div');
      title.className = 'topic-title';

      const dot = document.createElement('span');
      dot.className = 'topic-dot';

      const name = document.createElement('span');
      name.className = 'topic-name';
      name.textContent = category.toUpperCase();

      const count = document.createElement('span');
      count.className = 'topic-count';
      count.textContent = (countByCategory[category] || 0) + ' từ';

      title.appendChild(dot);
      title.appendChild(name);
      header.appendChild(title);
      header.appendChild(count);
      container.appendChild(header);
    }

    const row = document.createElement('div');
    row.className = 'word-row';

    const left = document.createElement('div');
    left.className = 'word-main';

    const word = document.createElement('b');
    word.className = 'word-speak';
    word.textContent = item.word || '';
    word.onclick = ()=>speakText(item.word || '');

    const small = document.createElement('small');
    small.textContent = item.pron || '';

    const right = document.createElement('div');
    right.className = 'word-meaning';
    right.textContent = item.meaning || '';

    const actions = document.createElement('div');
    actions.className = 'word-actions';

    const speak = document.createElement('button');
    speak.className = 'speaker-btn';
    speak.type = 'button';
    speak.title = 'Nghe phát âm';
    speak.setAttribute('aria-label', 'Nghe phát âm ' + (item.word || ''));
    speak.textContent = '🔊';
    speak.onclick = (event)=>{event.stopPropagation();speakText(item.word || '')};

    left.appendChild(word);
    left.appendChild(small);
    actions.appendChild(speak);

    row.appendChild(left);
    row.appendChild(right);
    row.appendChild(actions);
    container.appendChild(row);
  });
}

function startBlast(){
  const w=document.getElementById('fallingWord');
  w.classList.remove('animate');
  void w.offsetWidth;
  if(!vocab.length){
    blastCurrent=null;
    w.textContent='Không có từ';
    document.getElementById('blastInput').value='';
    document.getElementById('blastScore').textContent='Chọn chủ đề khác để chơi Blast';
    return;
  }
  blastCurrent=randomItem();
  w.textContent=blastCurrent.word;
  w.classList.add('animate');
  document.getElementById('blastInput').value='';
  document.getElementById('blastScore').textContent='Điểm Blast: '+blastScore;
}function checkBlast(){if(!blastCurrent)return;const input=normalize(document.getElementById('blastInput').value);if(input===normalize(blastCurrent.meaning)){blastScore++;startBlast()}else document.getElementById('blastScore').textContent='Sai rồi. Nghĩa đúng: '+blastCurrent.meaning}
function startMatch(){
  clearInterval(matchInterval);
  matchSeconds=0;
  selectedWord=null;
  selectedMeaning=null;
  const words=document.getElementById('matchWords'),meanings=document.getElementById('matchMeanings');
  words.innerHTML='';
  meanings.innerHTML='';
  if(!vocab.length){
    document.getElementById('matchTimer').textContent='Không có từ trong chủ đề này';
    return;
  }
  document.getElementById('matchTimer').textContent='Thời gian: 0s';
  matchInterval=setInterval(()=>{matchSeconds++;document.getElementById('matchTimer').textContent='Thời gian: '+matchSeconds+'s'},1000);
  const sample=shuffle(vocab).slice(0,Math.min(6,vocab.length));
  sample.forEach(item=>{const d=document.createElement('div');d.className='match-item';d.textContent=item.word;d.dataset.word=item.word;d.onclick=()=>selectMatch(d,'word');words.appendChild(d)});
  shuffle(sample).forEach(item=>{const d=document.createElement('div');d.className='match-item';d.textContent=item.meaning;d.dataset.word=item.word;d.onclick=()=>selectMatch(d,'meaning');meanings.appendChild(d)});
}
function selectMatch(el,type){if(type==='word'){document.querySelectorAll('#matchWords .match-item').forEach(i=>i.classList.remove('selected'));selectedWord=el}else{document.querySelectorAll('#matchMeanings .match-item').forEach(i=>i.classList.remove('selected'));selectedMeaning=el}el.classList.add('selected');if(selectedWord&&selectedMeaning){if(selectedWord.dataset.word===selectedMeaning.dataset.word){selectedWord.classList.add('done');selectedMeaning.classList.add('done')}selectedWord.classList.remove('selected');selectedMeaning.classList.remove('selected');selectedWord=null;selectedMeaning=null;if(document.querySelectorAll('.match-item:not(.done)').length===0){clearInterval(matchInterval);document.getElementById('matchTimer').textContent='Hoàn thành trong '+matchSeconds+'s 🎉'}}}
initCategories();applyFilters();renderFlashcard();


/* AUTO ONLINE LOOKUP: tra từ bất kỳ khi kho offline không có */
let onlineLookupTimer=null;
let lastOnlineLookupQuery="";
function getOnlineLookupBox(){
  let box=document.getElementById("onlineLookupResult");
  if(!box){
    const toolbar=document.querySelector(".toolbar");
    box=document.createElement("div");
    box.id="onlineLookupResult";
    if(toolbar) toolbar.insertAdjacentElement("afterend",box);
  }
  return box;
}
function clearOnlineLookup(){
  const box=getOnlineLookupBox();
  if(box) box.innerHTML="";
}
function renderOnlineLookupLoading(q){
  const box=getOnlineLookupBox();
  if(!box) return;
  box.innerHTML=`<div class="online-lookup-card"><h3>🔎 Đang tra online: ${escapeHTML(q)}</h3><p class="mini">Kho offline chưa có từ này, web đang tìm nghĩa tự động...</p></div>`;
}
function normalizeLookupQuery(q){
  return String(q||"").trim().replace(/\s+/g," ");
}
function hasLocalLookupResult(q){
  const key=normalizeLookupQuery(q).toLowerCase();
  if(!key) return true;
  return allVocab.some(v =>
    String(v.word||"").toLowerCase().includes(key) ||
    String(v.meaning||"").toLowerCase().includes(key) ||
    String(v.category||"").toLowerCase().includes(key)
  );
}
async function translateToVietnamese(text){
  try{
    const url="https://api.mymemory.translated.net/get?q="+encodeURIComponent(text)+"&langpair=en|vi";
    const res=await fetch(url);
    if(!res.ok) throw new Error("translate failed");
    const data=await res.json();
    return data?.responseData?.translatedText || "";
  }catch(e){
    return "";
  }
}
async function lookupAnyWordOnline(q){
  q=normalizeLookupQuery(q);
  if(!q || q.length<2) { clearOnlineLookup(); return; }
  if(hasLocalLookupResult(q)) { clearOnlineLookup(); return; }
  if(q===lastOnlineLookupQuery) return;
  lastOnlineLookupQuery=q;
  renderOnlineLookupLoading(q);
  try{
    const dictUrl="https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(q);
    const res=await fetch(dictUrl);
    if(!res.ok) throw new Error("not found");
    const data=await res.json();
    const entry=data?.[0]||{};
    const phonetic=entry.phonetic || (entry.phonetics||[]).find(p=>p.text)?.text || "";
    const audioObj=(entry.phonetics||[]).find(p=>p.audio);
    const audio=audioObj?.audio || "";
    const meaningObj=(entry.meanings||[])[0]||{};
    const part=meaningObj.partOfSpeech || "";
    const defObj=(meaningObj.definitions||[])[0]||{};
    const def=defObj.definition || "";
    const example=defObj.example || "";
    const vi=await translateToVietnamese(def || q);
    const box=getOnlineLookupBox();
    box.innerHTML=`
      <div class="online-lookup-card">
        <h3>🌐 ${escapeHTML(entry.word || q)} ${phonetic ? `<span class="mini">${escapeHTML(phonetic)}</span>` : ""}</h3>
        ${part ? `<p><b>Loại từ:</b> ${escapeHTML(part)}</p>` : ""}
        ${vi ? `<p><b>Nghĩa tiếng Việt:</b> ${escapeHTML(vi)}</p>` : ""}
        ${def ? `<p><b>Định nghĩa Anh:</b> ${escapeHTML(def)}</p>` : ""}
        ${example ? `<p><b>Ví dụ:</b> ${escapeHTML(example)}</p>` : ""}
        <p class="mini">Kết quả này lấy online vì kho từ trong file chưa có sẵn từ này.</p>
        <div class="online-lookup-actions">
          <button type="button" onclick="speakText('${escapeAttr(entry.word || q)}')">🔊 Đọc từ</button>
          ${audio ? `<button class="secondary" type="button" onclick="new Audio('${escapeAttr(audio)}').play()">▶ Audio gốc</button>` : ""}
        </div>
      </div>
    `;
  }catch(e){
    const box=getOnlineLookupBox();
    box.innerHTML=`
      <div class="online-lookup-card">
        <h3>❌ Chưa tìm thấy: ${escapeHTML(q)}</h3>
        <p>Thử nhập từ tiếng Anh đơn giản hơn, ví dụ: <b>love</b>, <b>beautiful</b>, <b>computer</b>.</p>
        <p class="mini">Nếu mở file offline không có mạng thì tính năng tra mọi từ sẽ không chạy.</p>
      </div>
    `;
  }
}
function scheduleOnlineLookup(){
  const input=document.getElementById("searchBox");
  const q=normalizeLookupQuery(input ? input.value : "");
  clearTimeout(onlineLookupTimer);
  if(!q || q.length<2 || hasLocalLookupResult(q)){
    clearOnlineLookup();
    return;
  }
  onlineLookupTimer=setTimeout(()=>lookupAnyWordOnline(q),650);
}
