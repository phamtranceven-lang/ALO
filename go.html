<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script>
(function(){
  const u = new URLSearchParams(location.search).get("u");
  if(u){
    try{
      const d = decodeURIComponent(u);
      if(d.startsWith("http")){
        location.replace(d); // nhanh + không lưu history
      }
    }catch(e){}
  }
})();
</script>

<title>Redirect</title>
</head>

<body>
</body>
</html>
