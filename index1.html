<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đang tải...</title>

<style>
  body {
    margin: 0;
    background: #0d1117;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .box {
    width: 300px;
    text-align: center;
  }

  .bar {
    width: 100%;
    height: 10px;
    background: #333;
    border-radius: 5px;
    overflow: hidden;
    margin-top: 15px;
  }

  .progress {
    height: 100%;
    width: 0%;
    background: lime;
    transition: width 0.2s;
  }
</style>
</head>

<body>

<div class="box">
  <h2>Đang tải hệ thống...</h2>
  <p id="status">Khởi động...</p>

  <div class="bar">
    <div class="progress" id="progress"></div>
  </div>
</div>

<script>
const target = "https://phamtranceven-lang.github.io/ALO";

let percent = 0;
const bar = document.getElementById("progress");
const status = document.getElementById("status");

const messages = [
  "Khởi động...",
  "Kết nối máy chủ...",
  "Xác thực...",
  "Tải dữ liệu...",
  "Gần xong..."
];

let i = 0;

const loading = setInterval(() => {
  percent += Math.random() * 15;
  if (percent > 100) percent = 100;

  bar.style.width = percent + "%";

  if (i < messages.length && percent > i * 20) {
    status.innerText = messages[i];
    i++;
  }

  if (percent >= 100) {
    clearInterval(loading);
    status.innerText = "Hoàn tất!";

    setTimeout(() => {
      setInterval(() => {
        window.location.href = target;
      }, 300);
    }, 1000);
  }
}, 300);

// chống back nhẹ
history.pushState(null, null, location.href);
window.onpopstate = () => history.go(1);

</script>

</body>
</html>
